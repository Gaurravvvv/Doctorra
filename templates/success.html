{% extends "base.html" %}

{% block content %}
<div class="container" style="text-align: center; margin-top: 50px;">
    <div class="card" style="border-top: 5px solid var(--primary-color);">
        <h1 style="color: var(--primary-color); font-size: 3rem; margin: 0;">#{{ visit.id }}</h1>
        <p style="font-size: 1.2rem; color: #555;">Your Token Number</p>
        
        <hr>
        
        <h3>Please have a seat.</h3>
        <p>The doctor will call you shortly.</p>
        
        <div style="margin-top: 30px; padding: 10px; background: #e3f2fd; border-radius: 4px;">
            <strong>Status:</strong> 
            <span style="text-transform: uppercase; font-weight: bold;">{{ visit.status }}</span>
        </div>
        
        <p style="margin-top: 30px;">
            <a href="{{ url_for('find_doctor') }}">Back to Home</a>
        </p>
    </div>
</div>
{% endblock %}
