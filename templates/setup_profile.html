{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 50px;">
    <div class="card">
        <h2 style="text-align: center;">Complete Your Profile</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">
            Please provide your details to generate your unique clinic ID and booking link.
        </p>

        <form method="POST">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" placeholder="e.g. Dr. John Doe" required>
            </div>

            <div class="form-group">
                <label for="specialization">Specialization</label>
                <input type="text" id="specialization" name="specialization" placeholder="e.g. Cardiologist, General Physician" required>
            </div>

            <button type="submit" class="btn-primary">Generate Profile</button>
        </form>
    </div>
</div>
{% endblock %}
